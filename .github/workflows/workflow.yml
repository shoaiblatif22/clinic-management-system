name: Build and Test
on:
  workflow_call: 
  workflow_dispatch: 

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify MailHog
        run: |
          curl --retry 5 --retry-delay 5 --retry-max-time 30 \
            --fail http://localhost:8025

      - name: Build with Maven
        run: |
          cd clinic-api
          mvn -B clean install -DskipTests
          find . -name "*.jar" -exec echo "Generated JAR: {}" \;

      - name: Run Unit Tests
        run: |
          cd clinic-api
          mvn test \
            -Dtest="**/unittests/**/*.java" \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Run Integration Tests
        run: |
          cd clinic-api
          mvn verify \
            -Dit.test="**/integrationtests/**/*.java" \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -Dspring.profiles.active=test

      - name: Verify JAR exists
        run: |
          ls -la clinic-api/target/*.jar || echo "No JAR file found!"


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinic-api
          path: clinic-api/target/*.jar
