
#specify a trigger
#on keyword triggers when we push a commit to repo
name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest # Or your desired runner OS

    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin' # You can change the distribution if needed

      - name: Check Java Version (for verification)
        run: |
          echo "JAVA_HOME after setup: $JAVA_HOME" 
          echo "Java Version: $JAVA_HOME"
          java -version
          # The check below should now pass
          if ! java -version 2>&1 | grep -q "17.*"; then
            echo "Error: Java 17 is required!"
            exit 1
          fi

      - name: Pre-clean files
        run: |
          mvn pre-clean

      - name: Clean files
        run: |
          mvn clean

      - name: Post-clean viles
        run: |
          mvn post-clean



      # ... your other build steps here ...



