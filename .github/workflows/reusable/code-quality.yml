name: Code Quality

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    # Run every day at midnight
    - cron: '0 0 * * *'

jobs:
  qodana:
    name: Run Qodana Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Cache Maven packages for faster builds
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          
      # Cache Qodana results for faster subsequent runs
      - name: Cache Qodana results
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/.qodana/cache
          key: qodana-cache-${{ hashFiles('**/pom.xml') }}
          
      # Run Qodana analysis
      - name: Run Qodana
        uses: JetBrains/qodana-action@v5
        with:
          linter: jetbrains/qodana-jvm-android:latest
          # Fail the build if problems are found
          fail-total-problems: true
          # Save the report as an artifact
          artifact-name: qodana-report
          # Set the path to analyze 
          paths: 'clinic-api'
          # Additional Qodana arguments
          args: --show-report
          
      # Upload the Qodana report
      - name: Upload Qodana report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: qodana-report
          path: ${{ github.workspace }}/.qodana/report/
          
      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('${{ github.workspace }}/.qodana/log/ci.log', 'utf8');
            const maxGitHubBodyLength = 65536;
            const reportPreview = report.length > maxGitHubBodyLength
              ? report.substring(0, maxGitHubBodyLength) + '\n... Report was truncated'
              : report;
            github.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Qodana found some issues\n\n```\n' + reportPreview + '\n```\n\n[Full Qodana Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#summary)'
            })
