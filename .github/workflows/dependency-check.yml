name: Dependency Check

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    # Weekly scan
    - cron: '0 0 * * 0'

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Cache Maven packages for faster builds
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          
      # Cache OWASP Dependency-Check data for faster scans
      - name: Cache OWASP Data
        uses: actions/cache@v3
        with:
          path: ~/.dependency-check/data
          key: ${{ runner.os }}-owasp-data
          restore-keys: |
            ${{ runner.os }}-owasp-data
            
      # Run OWASP Dependency-Check
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          # Scan the entire project directory
          path: 'clinic-api'
          # Fail the build if a CVSS score above 7 is found
          failBuildOnCVSS: 7
          # Generate reports in multiple formats
          format: 'HTML SARIF JSON'
          # Output directory for reports
          output: '${{ github.workspace }}/dependency-check-reports'
          # Additional CLI arguments
          args: >
            --enableExperimental
            --enableRetired
            --failOnCVSS 7
            --log dependency-check.log
          
          project: ''
      # Upload the dependency check reports as artifacts
      - name: Upload dependency check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: dependency-check-reports/
          retention-days: 7
          
      # Upload SARIF results for GitHub code scanning
      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: dependency-check-reports/dependency-check-report.sarif
          
      # Comment on PRs with high severity findings
      - name: Comment on PR with high severity findings
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('${{ github.workspace }}/dependency-check-reports/dependency-check-report.json', 'utf8'));
              const highVulns = report.dependencies.flatMap(dep => 
                (dep.vulnerabilities || [])
                  .filter(v => v.severity === 'HIGH' || v.severity === 'CRITICAL')
                  .map(v => ({
                    name: dep.fileName,
                    cve: v.name,
                    severity: v.severity,
                    description: v.description || 'No description available',
                    cvssScore: v.cvssv3?.baseScore || v.cvssv2?.score || 'N/A'
                  }))
              );

              if (highVulns.length > 0) {
                let comment = '## 🔴 High/Critical Vulnerabilities Found\n\n';
                comment += '| Dependency | CVE | Severity | CVSS Score |\n';
                comment += '|------------|-----|-----------|------------|\n';
                
                highVulns.forEach(vuln => {
                  comment += `| ${vuln.name} | ${vuln.cve} | ${vuln.severity} | ${vuln.cvssScore} |\n`;
                });
                
                comment += '\n**Please review the full report in the artifacts for details.**';
                
                github.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (error) {
              console.error('Error generating vulnerability report:', error);
            }
