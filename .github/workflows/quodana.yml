name: Code Quality

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  qodana:
    name: Run Qodana Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Cache Qodana results
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/.qodana/cache
          key: qodana-cache-${{ hashFiles('**/pom.xml') }}

      - name: Run Qodana
        uses: JetBrains/qodana-action@v4
        with:
          linter: jetbrains/qodana-jvm-community:latest
          project-dir: ./clinic-api
          fail-total-problems: true
          args: --show-report

      - name: Upload Qodana report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-report
          path: ${{ github.workspace }}/.qodana/report/
          retention-days: 7

      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('${{ github.workspace }}/.qodana/log/ci.log', 'utf8');
            const maxGitHubBodyLength = 65536;
            const reportPreview = report.length > maxGitHubBodyLength
              ? report.substring(0, maxGitHubBodyLength) + '\n... Report was truncated'
              : report;
            github.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Qodana found some issues\n\n```\n' + reportPreview + '\n```\n\n[Full Qodana Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#summary)'
            });
