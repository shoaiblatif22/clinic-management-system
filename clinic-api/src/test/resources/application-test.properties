# =============================================
# TEST APPLICATION CONFIGURATION
# =============================================

# Application Identification
spring.application.name=clinic-management-system-test

# =============================================
# DATABASE CONFIGURATION (H2 IN-MEMORY)
# =============================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10

# =============================================
# SECURITY CONFIGURATION (TEST-SPECIFIC)
# =============================================
# OAuth2/JWT Test Settings
spring.security.oauth2.resourceserver.jwt.enabled=false
spring.security.oauth2.client.registration.keycloak.enabled=false

# Test JWT Configuration
jwt.secret=test-secret-12345678901234567890123456789012
jwt.expiration=3600000

# Security Auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

# =============================================
# SERVICE MOCKING CONFIGURATION
# =============================================
# Email (using MailHog default test port)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# =============================================
# TEST-SPECIFIC OVERRIDES
# =============================================
# Disable Flyway in tests
flyway.enabled=false

# Disable scheduling in tests
spring.scheduling.enabled=false

# =============================================
# ACTUATOR CONFIGURATION
# =============================================
# Actuator endpoints
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.roles=ACTUATOR
management.endpoints.web.path-mapping.health=health

# Disable health checks
management.health.defaults.enabled=false
management.health.db.enabled=true
management.health.mail.enabled=false

# Management security
management.security.enabled=false

# =============================================
# SPRING BOOT CONFIGURATION
# =============================================
# Allow bean definition overriding
spring.main.allow-bean-definition-overriding=true