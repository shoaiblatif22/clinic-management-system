# Application Name
spring.application.name=clinic-management-system

  # Server Configuration
server.port=8080

  # Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/clinical_management_db
spring.datasource.username=clinic_user
spring.datasource.password=clinic_password
spring.datasource.driver-class-name=org.postgresql.Driver

  # JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

  # Flyway Configuration
flyway.enabled=true

  # Logging Configuration
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{dd-MM-yyyy HH:mm:ss} %magenta([%thread]) %highlight(%-5level) %logger.%M - %msg%n

